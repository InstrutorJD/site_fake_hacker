<div class="overlay"></div>

    <div id="main-shell">

            <p>Acesso ao Nível V.</p>

            <input type="number" id="answer" pattern="\d*" inputmode="numeric" placeholder="Digite aqui">
            <button onclick="processAuth()">AUTENTICAR</button>

    <div id="hacker-terminal">
