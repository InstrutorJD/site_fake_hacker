<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA RESTRITO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay"></div>

    <div id="main-shell">
        <div class="terminal-box">
            <h1>[RESTRITO]</h1>
            <p>Acesso ao Nível V.</p>
            <p> Qual a senha do Wifi que o professor passou?</p>
            <input type="number" id="answer" pattern="\d*" inputmode="numeric" placeholder="CÓDIGO">
            <button onclick="processAuth()">AUTENTICAR</button>
        </div>
    </div>

    <div id="hacker-terminal">
        <div class="critical">ALERTA: ACESSO NEGADO!</div>
        <p style="color: white;">Iniciando contra-medidas invasivas...</p>
        <div id="fail-logs" class="log-list"></div>
        <div class="progress-bar-container" style="color: #ff0000;">
            <div id="fail-bar" class="progress-fill"></div>
        </div>
        <p id="fail-status" style="color: #ff0000;">ESTADO: AGUARDANDO RESPOSTA...</p>
    </div>

    <div id="success-screen">
        <h2 style="color: #00ccff;">> ACESSO CONCEDIDO</h2>
        <div id="success-logs" class="log-list"></div>
        <div class="progress-bar-container" style="color: #00ccff;">
            <div id="success-bar" class="progress-fill"></div>
        </div>
        <p>REDIRECIONANDO PARA CANAL SEGURO...</p>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
